<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadi Vandeventer – CV</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-start:      #0a000f;
      --bg-mid:        #1a0030;
      --bg-end:        #0d0018;
      --accent:        #b44fff;
      --accent-dim:    #7b2fbe;
      --text-primary:  #f0e6ff;
      --text-secondary:#c4a8e8;
      --glass-bg:      rgba(100, 20, 160, 0.12);
      --glass-border:  rgba(180, 79, 255, 0.25);
      --btn-bg:        rgba(140, 40, 200, 0.18);
      --btn-hover:     rgba(180, 79, 255, 0.32);
      --btn-border:    rgba(180, 79, 255, 0.55);
      --shadow:        0 4px 32px rgba(100, 0, 180, 0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.7;
    }

    /* ── Subtle animated background orbs ── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(130, 0, 255, 0.18) 0%, transparent 70%);
      top: -120px; left: -120px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(180, 79, 255, 0.14) 0%, transparent 70%);
      bottom: -100px; right: -100px;
    }

    /* ── Layout ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── Glass card ── */
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      margin-bottom: 1.75rem;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    /* ── Header / Hero ── */
    .hero {
      text-align: center;
      padding: 3rem 2.5rem 2.5rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #d88fff, #b44fff, #7b2fbe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
    }
    .hero .tagline {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 1.6rem;
    }

    /* ── Nav buttons (translucent) ── */
    .nav-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1.2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.5rem 1.4rem;
      border-radius: 999px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--text-primary);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-decoration: none;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background 0.25s, border-color 0.25s, transform 0.15s, box-shadow 0.25s;
    }
    .btn:hover, .btn:focus-visible {
      background: var(--btn-hover);
      border-color: var(--accent);
      box-shadow: 0 0 14px rgba(180, 79, 255, 0.45);
      transform: translateY(-2px);
      outline: none;
    }
    .btn-primary {
      background: rgba(140, 40, 200, 0.35);
      border-color: var(--accent);
    }

    /* ── Section headings ── */
    section { scroll-margin-top: 1.5rem; }
    .section-title {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }

    /* ── About ── */
    .about-text { color: var(--text-secondary); }

    /* ── Skills ── */
    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .skill-tag {
      padding: 0.35rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      font-size: 0.85rem;
      color: var(--text-primary);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .skills-group { margin-bottom: 1rem; }
    .skills-group:last-child { margin-bottom: 0; }
    .skills-group-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 0.5rem;
    }

    /* ── Experience & Education ── */
    .entry { margin-bottom: 1.5rem; }
    .entry:last-child { margin-bottom: 0; }
    .entry-header {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.3rem;
    }
    .entry-title {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--text-primary);
    }
    .entry-period {
      font-size: 0.85rem;
      color: var(--accent-dim);
    }
    .entry-subtitle {
      font-size: 0.9rem;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }
    .entry-desc { color: var(--text-secondary); font-size: 0.95rem; }
    .entry-bullets {
      list-style: none;
      margin-top: 0.4rem;
    }
    .entry-bullets li {
      color: var(--text-secondary);
      font-size: 0.95rem;
      padding-left: 1.2rem;
      position: relative;
      margin-bottom: 0.25rem;
    }
    .entry-bullets li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--accent-dim);
    }

    /* ── Contact ── */
    .contact-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    /* ── Divider ── */
    hr.divider {
      border: none;
      border-top: 1px solid var(--glass-border);
      margin: 0.5rem 0 1.2rem;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .card { padding: 1.4rem 1.2rem; }
      .hero  { padding: 2rem 1.2rem 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <!-- Content rendered by JavaScript -->
  </div>

  <script>
    // ── CV Data ──────────────────────────────────────────────────────────────
    const cv = {
      name: 'Shadi Vandeventer',
      tagline: 'Computer Science Student &nbsp;·&nbsp; Zurich, Switzerland',
      about: 'CS student at the University of Zurich with a background in audio engineering and music production. Passionate about discrete neural networks, digital signal processing, and building elegant software solutions — from custom language interpreters to audio VST plugins.',
      contact: {
        phone: '078 830 56 61',
        // Email assembled at runtime to reduce naive bot scraping
        email: ['shavdv', 'gmail.com'].join('@'),
        linkedin: { label: 'LinkedIn', url: 'https://linkedin.com/in/shadi-vandeventer' },
        gitlab:   { label: 'GitLab',   url: 'https://gitlab.uzh.ch/shadisamuelthierry.vandeventer' },
      },
      skills: [
        {
          group: 'Languages',
          tags: ['Python', 'C', 'Java', 'C++', 'JavaScript'],
        },
        {
          group: 'Tools',
          tags: ['Git', 'Gurobipy', 'VST SDK'],
        },
        {
          group: 'Interests',
          tags: ['Discrete Neural Networks', 'Digital Signal Processing (Audio)', 'Emulation', 'Android Programming', 'Network Applications'],
        },
      ],
      education: [
        {
          title: 'B.S. Computer Science – Computer Linguistics minor',
          period: 'Sep. 2024 – Present',
          subtitle: 'University of Zurich &nbsp;·&nbsp; Zurich, Switzerland',
          bullets: [
            'GPA: 5.3',
            'Courses: Data Structures & Algorithms, Foundations of Computing 1 & 2 (5.75), Intro to AI, Computer Networks and Distributed Systems (6.0), Intro to Operations Research, Database Systems',
          ],
        },
        {
          title: 'Diploma – Audio Engineering & Music Production',
          period: 'Sep. 2022 – Aug. 2023',
          subtitle: 'SAE Institute Zurich &nbsp;·&nbsp; Zurich, Switzerland',
          bullets: [],
        },
      ],
      experience: [
        {
          title: 'Substitute Teacher',
          period: 'Feb. 2025',
          subtitle: 'Zurich International School &nbsp;·&nbsp; Zurich, Switzerland',
          bullets: [
            'Instructed high school students in Java and JavaScript programming fundamentals, adapting lesson plans to ensure comprehension across varying skill levels.',
            'Facilitated hands-on coding exercises and debugging sessions, fostering problem-solving skills and best practices in software development.',
          ],
        },
      ],
      projects: [
        {
          title: 'Custom Programming Language Interpreter',
          period: '2025',
          subtitle: 'Python',
          bullets: [
            'Created a custom programming language interpreter with arithmetic operators, boolean logic, control flow (do-until loops), and data structures (arrays, sets).',
            'Implemented functional programming paradigms (map, reduce, filter) and built a visual execution tracer with timing analysis for debugging and profiling.',
          ],
        },
        {
          title: 'Hash-Based Backup System',
          period: '2025',
          subtitle: 'Python',
          bullets: [
            'Engineered a file backup system that tracks folder content through cryptographic hashing to detect file modifications efficiently.',
            'Implemented incremental backup and restoration functionality, optimizing storage by only backing up changed files.',
          ],
        },
        {
          title: 'Audio Distortion VST Plugin',
          period: '2024',
          subtitle: 'C++ / VST SDK',
          bullets: [
            'Created a custom audio distortion and clipping plugin using the VST SDK, implementing real-time digital signal processing algorithms.',
          ],
        },
      ],
      other: [
        {
          title: 'Parkour Instructor',
          period: '2024 – Present',
          subtitle: 'ASVZ (Academic Sports Association Zurich) &nbsp;·&nbsp; Zurich, Switzerland',
          bullets: [
            'Lead parkour training sessions for students, teaching movement fundamentals, safety protocols, and progressive skill development.',
            'Design and supervise training programs that build strength, coordination, and confidence through parkour techniques.',
          ],
        },
        {
          title: 'Active Member',
          period: '2024 – Present',
          subtitle: 'ICU – Informatics Club UZH (CS Student Association) &nbsp;·&nbsp; Zurich, Switzerland',
          bullets: [
            'Participate in computer science student community events, workshops, and collaborative learning initiatives.',
            'Engage with fellow CS students to share knowledge and build professional networks within the university.',
          ],
        },
      ],
    };

    // ── Helpers ──────────────────────────────────────────────────────────────
    function el(tag, attrs = {}, ...children) {
      const node = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'className') node.className = v;
        else if (k === 'innerHTML') node.innerHTML = v;
        else node.setAttribute(k, v);
      }
      for (const child of children) {
        if (typeof child === 'string') node.appendChild(document.createTextNode(child));
        else if (child) node.appendChild(child);
      }
      return node;
    }

    function card(...children) {
      return el('div', { className: 'card' }, ...children);
    }

    function sectionTitle(text) {
      return el('h2', { className: 'section-title' }, text);
    }

    function divider() {
      return el('hr', { className: 'divider' });
    }

    function renderBullets(bullets) {
      if (!bullets || bullets.length === 0) return null;
      const ul = el('ul', { className: 'entry-bullets' });
      for (const b of bullets) {
        ul.appendChild(el('li', {}, b));
      }
      return ul;
    }

    function renderEntry(entry, isLast) {
      const frag = document.createDocumentFragment();
      const div = el('div', { className: 'entry' });
      const header = el('div', { className: 'entry-header' },
        el('span', { className: 'entry-title' }, entry.title),
        el('span', { className: 'entry-period' }, entry.period),
      );
      div.appendChild(header);
      div.appendChild(el('p', { className: 'entry-subtitle', innerHTML: entry.subtitle }));
      if (entry.desc) div.appendChild(el('p', { className: 'entry-desc' }, entry.desc));
      const bullets = renderBullets(entry.bullets);
      if (bullets) div.appendChild(bullets);
      frag.appendChild(div);
      if (!isLast) frag.appendChild(divider());
      return frag;
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      const app = document.getElementById('app');

      // Hero
      const heroSection = el('section', { id: 'top' });
      const heroCard = el('div', { className: 'card hero' });
      heroCard.appendChild(el('h1', {}, cv.name));
      heroCard.appendChild(el('p', { className: 'tagline', innerHTML: cv.tagline }));
      const nav = el('nav', { className: 'nav-buttons', 'aria-label': 'Page sections' });
      const navLinks = [
        ['#about',      'About',      ''],
        ['#skills',     'Skills',     ''],
        ['#experience', 'Experience', ''],
        ['#projects',   'Projects',   ''],
        ['#education',  'Education',  ''],
        ['#other',      'Activities', ''],
        ['#contact',    'Contact',    'btn-primary'],
      ];
      for (const [href, label, extra] of navLinks) {
        nav.appendChild(el('a', { className: `btn ${extra}`.trim(), href }, label));
      }
      heroCard.appendChild(nav);
      heroSection.appendChild(heroCard);
      app.appendChild(heroSection);

      // About
      const aboutSection = el('section', { id: 'about' });
      aboutSection.appendChild(card(
        sectionTitle('About'),
        el('p', { className: 'about-text' }, cv.about),
      ));
      app.appendChild(aboutSection);

      // Skills
      const skillsSection = el('section', { id: 'skills' });
      const skillsCard = card(sectionTitle('Skills'));
      for (const group of cv.skills) {
        const groupDiv = el('div', { className: 'skills-group' });
        groupDiv.appendChild(el('p', { className: 'skills-group-label' }, group.group));
        const grid = el('div', { className: 'skills-grid' });
        for (const tag of group.tags) {
          grid.appendChild(el('span', { className: 'skill-tag' }, tag));
        }
        groupDiv.appendChild(grid);
        skillsCard.appendChild(groupDiv);
      }
      skillsSection.appendChild(skillsCard);
      app.appendChild(skillsSection);

      // Experience
      const expSection = el('section', { id: 'experience' });
      const expCard = card(sectionTitle('Experience'));
      cv.experience.forEach((entry, i) => {
        expCard.appendChild(renderEntry(entry, i === cv.experience.length - 1));
      });
      expSection.appendChild(expCard);
      app.appendChild(expSection);

      // Projects
      const projSection = el('section', { id: 'projects' });
      const projCard = card(sectionTitle('Projects'));
      cv.projects.forEach((entry, i) => {
        projCard.appendChild(renderEntry(entry, i === cv.projects.length - 1));
      });
      projSection.appendChild(projCard);
      app.appendChild(projSection);

      // Education
      const eduSection = el('section', { id: 'education' });
      const eduCard = card(sectionTitle('Education'));
      cv.education.forEach((entry, i) => {
        eduCard.appendChild(renderEntry(entry, i === cv.education.length - 1));
      });
      eduSection.appendChild(eduCard);
      app.appendChild(eduSection);

      // Other / Activities
      const otherSection = el('section', { id: 'other' });
      const otherCard = card(sectionTitle('Activities'));
      cv.other.forEach((entry, i) => {
        otherCard.appendChild(renderEntry(entry, i === cv.other.length - 1));
      });
      otherSection.appendChild(otherCard);
      app.appendChild(otherSection);

      // Contact
      const contactSection = el('section', { id: 'contact' });
      const contactCard = card(sectionTitle('Contact'));
      const links = el('div', { className: 'contact-links' });
      links.appendChild(el('a', { className: 'btn', href: `mailto:${cv.contact.email}` }, '✉ ' + cv.contact.email));
      links.appendChild(el('a', { className: 'btn', href: `tel:${cv.contact.phone.replace(/\s/g, '')}` }, '📞 ' + cv.contact.phone));
      links.appendChild(el('a', { className: 'btn', href: cv.contact.linkedin.url, target: '_blank', rel: 'noopener' }, cv.contact.linkedin.label));
      links.appendChild(el('a', { className: 'btn', href: cv.contact.gitlab.url, target: '_blank', rel: 'noopener' }, cv.contact.gitlab.label));
      contactCard.appendChild(links);
      contactSection.appendChild(contactCard);
      app.appendChild(contactSection);
    }

    render();
  </script>
</body>
</html>
